# 운영 환경 설정
server:
  port: 8090
  # Behind Nginx/SSL: trust X-Forwarded-* to compute request scheme/host for {baseUrl}
  forward-headers-strategy: framework
  # 세션 쿠키 설정 (올바른 prefix: server.servlet.session.cookie.*)
  # 주의: 기존 spring.session.cookie.* 는 Spring Boot 가 인식하지 못해 실제로는 무시되고 있었음
  servlet:
    session:
      timeout: 86400 # 서버 세션 만료(초) - 쿠키 max-age 와 일치 (24시간)
      cookie:
        name: JSESSIONID
        domain: ${COOKIE_DOMAIN:laputa.kozow.com}
        secure: ${COOKIE_SECURE:true}        # HTTPS 운영: 평문(HTTP) 전송 차단을 위해 기본 true
        same-site: ${COOKIE_SAME_SITE:lax}   # 교차 사이트 위조 요청 1차 방어
        http-only: true                       # JS 접근 차단(XSS 로 인한 세션 탈취 방지)
        max-age: 86400 # 24시간

# Spring 설정 (통합)
spring:
  # 타임존 설정 (한국 시간)
  jackson:
    time-zone: Asia/Seoul

  # 데이터베이스 설정 (PostgreSQL) - 운영 환경
  datasource:
    url: jdbc:postgresql://${DB_HOST:ott-postgres}:${DB_PORT:5432}/${DB_NAME:ott_project_db}?serverTimezone=Asia/Seoul
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA 설정 - Hibernate ORM
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul
          batch_size: 20
        format_sql: false
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: false

  # Redis 연결 (도커 기본: ott-redis:6379)
  data:
    redis:
      host: ${REDIS_HOST:ott-redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  # Kafka 연결 (결제 성공 이후 부수효과 이벤트 스트림)
  # 도커 내부 리스너로 접속(egress 불필요). 브로커는 default(internal) 네트워크의 ott-kafka.
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:ott-kafka:9094}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all # 리더+ISR 모두 확인(내구성 우선)
    consumer:
      group-id: ott-payment-consumers # 부수효과 컨슈머 그룹
      auto-offset-reset: earliest # 신규 컨슈머는 처음부터(리플레이/백필 친화)
      enable-auto-commit: false # 처리 성공 후 수동 커밋
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: record # 레코드 단위 커밋

  # RabbitMQ 연결 (정기결제 실패 재시도 지연 큐: TTL+DLX)
  # 브로커는 default(internal) 네트워크의 ott-rabbitmq. 자격증명은 compose 기본값과 동일 규칙.
  rabbitmq:
    host: ${RABBITMQ_HOST:ott-rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:ott}
    password: ${RABBITMQ_PASSWORD:ott-local}
    listener:
      simple:
        default-requeue-rejected: false # 처리 예외 시 무한 재큐잉 방지(리스너 내부에서 로깅 후 폐기)

  # 메일 설정 (네이버 SMTP)
  mail:
    host: ${MAIL_HOST:smtp.naver.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: false
            trust: smtp.naver.com
            protocols: TLSv1.2
          starttls:
            enable: true
            required: true
          from: ${MAIL_FROM:}
    transport:
      protocol: smtp

  # 세션 설정 (Spring Session + Redis: 분산/영속 세션 저장소)
  # 톰캣 인메모리 세션과 달리 재배포·다중 인스턴스에서도 세션이 유지됨
  session:
    store-type: redis        # 세션을 Redis 에 저장
    timeout: 86400           # 세션 만료(초) - 쿠키 max-age 와 일치 (24시간)
    redis:
      namespace: ott:session # Redis 키 네임스페이스
      flush-mode: on-save

  # OAuth2 클라이언트 설정
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: [profile, email]
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            client-name: Google
          kakao:
            client-id: ${KAKAO_CLIENT_ID:}
            client-secret: ${KAKAO_CLIENT_SECRET:}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            scope: [profile_nickname, account_email]
            client-name: Kakao
            provider: kakao
          naver:
            client-id: ${NAVER_CLIENT_ID:}
            client-secret: ${NAVER_CLIENT_SECRET:}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/naver"
            scope: [name, email]
            client-name: Naver
            provider: naver
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

# baseUrl 설정
baseUrl: ${BASE_URL:https://laputa.kozow.com}

# 로깅 설정 (운영 환경)
logging:
  level:
    com.ottproject.ottbackend: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    "org.hibernate.type.descriptor.sql.BasicBinder": WARN
    org.springframework.security: INFO
    org.springframework.security.oauth2: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/ott-backend.log

# TMDB API 설정
tmdb:
  api:
    key: ${TMDB_API_KEY:}
    base-url: https://api.themoviedb.org/3

# Jikan API Rate Limiting 설정
jikan:
  api:
    base-url: https://api.jikan.moe/v4
  rate-limit:
    max-rps: 1.0
    backoff-ms: 1000
    retry:
      backoff-ms: 5000

# Iamport (아임포트) 결제 설정
iamport:
  merchant:
    code: ${IAMPORT_MERCHANT_CODE:}
  rest:
    api-key: ${IAMPORT_API_KEY:}
    api-secret: ${IAMPORT_API_SECRET:}
  webhook:
    url: ${IAMPORT_WEBHOOK_URL:}
  pg:
    kakao:
      channel-key: ${IAMPORT_KAKAO_CHANNEL_KEY:}
    toss:
      channel-key: ${IAMPORT_TOSS_CHANNEL_KEY:}
    nice:
      channel-key: ${IAMPORT_NICE_CHANNEL_KEY:}

# Cloudflare Turnstile (봇 방어) — secret 미설정 시 기능 비활성(no-op)
turnstile:
  secret-key: ${TURNSTILE_SECRET_KEY:}

# 결제 설정 (운영 환경)
payments:
  test-amount: ${PAYMENT_TEST_AMOUNT:1}
  dev-mode: ${PAYMENT_DEV_MODE:false}

# 정기결제 실패 재시도 지연(밀리초) - RabbitMQ 대기 큐의 x-message-ttl로 사용
# 주의: 큐 인자는 최초 선언 시 고정되므로 값 변경 시 기존 대기 큐를 삭제해야 반영된다.
billing:
  retry:
    first-delay-ms: ${BILLING_RETRY_FIRST_DELAY_MS:10800000}   # 1차 실패 후 3시간
    second-delay-ms: ${BILLING_RETRY_SECOND_DELAY_MS:86400000} # 2차 실패 후 24시간

# MyBatis 설정
mybatis:
  mapper-locations: classpath*:/mappers/**/*.xml
  type-aliases-package: com.ottproject.ottbackend.dto
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
    map-underscore-to-camel-case: true

# 최근 검색어 Redis 설정
app:
  redis:
    namespace: ${REDIS_NAMESPACE:ott}
  recent-search:
    ttl-days: ${RECENT_SEARCH_TTL_DAYS:30}
  # 로그인 실패 임계치 기반 계정 잠금(brute-force 방어)
  login:
    max-fail-attempts: ${LOGIN_MAX_FAIL_ATTEMPTS:5} # 잠금 임계치(실패 횟수)
    lock-minutes: ${LOGIN_LOCK_MINUTES:15}          # 잠금 지속 시간(분)
    turnstile-after-fails: ${LOGIN_TURNSTILE_AFTER_FAILS:1} # 이 횟수 이상 실패 시 사람 확인(Turnstile) 요구

# Swagger UI 비활성화 (프로덕션)
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# Actuator 헬스체크 설정 (UptimeRobot 모니터링용)
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never