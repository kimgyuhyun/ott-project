version: 2
updates:
  # 프론트엔드 (Next.js / npm)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    groups:
      frontend-minor:
        update-types: ["minor", "patch"]
    open-pull-requests-limit: 5

  # 백엔드 (Spring Boot / gradle)
  - package-ecosystem: "gradle"
    directory: "/backend"
    schedule:
      interval: "weekly"
    groups:
      backend-minor:
        update-types: ["minor", "patch"]
    open-pull-requests-limit: 5

  # Docker 베이스 이미지
  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"

  # GitHub Actions 워크플로우
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
