name: CD

# ============================================================================
# 보안 재설계 (2026-06-24, XMRig 재감염 대응)
# ----------------------------------------------------------------------------
# CI(ci.yml)가 ghcr.io 비공개 레지스트리로 push + Trivy 스캔 통과한 이미지를,
# self-hosted 러너가 commit-sha 태그로 pull → "digest로 고정" → egress 차단 보안
# 스택(docker-compose.netlock.yml)으로 배포 → 백엔드 헬스 + 프론트엔드 egress
# 차단을 검증(둘 중 하나라도 실패하면 배포 실패 처리).
#   * 인증: GITHUB_TOKEN(단기). 장기 자격증명 불필요.
#   * digest 고정: 태그 덮어쓰기 공격 무력화 + 스캔한 그 이미지 그대로 배포.
#   * 이미지가 혹시 오염돼도 frontend는 egress가 없어 드로퍼/채굴 불가(다층 방어).
# ============================================================================
on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  packages: read          # ghcr pull (GITHUB_TOKEN)

jobs:
  deploy:
    runs-on: self-hosted
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.event == 'push') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # CI와 동일하게 공식 액션으로 ghcr 로그인(러너에 자격증명 저장).
      # 수동 docker login --password-stdin은 Windows PowerShell 파이프에서 토큰 전달이
      # 불안정해 'denied'가 발생할 수 있어 사용하지 않는다.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy (ghcr digest-pinned + egress-locked secure stack)
        shell: powershell -ExecutionPolicy Bypass -File {0}
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          OWNER: ${{ github.repository_owner }}
          AGE_KEY: ${{ secrets.AGE_KEY }}
        run: |
          Set-StrictMode -Version Latest
          $ProgressPreference = 'SilentlyContinue'
          $ErrorActionPreference = 'Stop'
          Set-Location $env:GITHUB_WORKSPACE
          Write-Host '=== CD START (ghcr digest) ==='

          $sha = $env:HEAD_SHA
          if (-not $sha) { $sha = (git rev-parse HEAD).Trim() }
          $owner   = $env:OWNER.ToLower()
          $appTag  = "ghcr.io/$owner/ott-backend:$sha"
          $frontTag= "ghcr.io/$owner/ott-frontend:$sha"
          Write-Host "commit=$sha"

          # --- 1) DB 백업 (실패해도 진행) ---
          try {
            $backupDir = 'C:\solo-project\backups'
            if (-not (Test-Path $backupDir)) { New-Item -ItemType Directory -Path $backupDir | Out-Null }
            $bf = Join-Path $backupDir ("db_{0}.sql" -f (Get-Date -Format 'yyyyMMdd_HHmmss'))
            docker exec ott-postgres pg_dump -U root ott_project_db | Out-File -FilePath $bf -Encoding UTF8
            Write-Host "DB backup -> $bf"
            Get-ChildItem $backupDir -Filter 'db_*.sql' | Where-Object { $_.LastWriteTime -lt (Get-Date).AddDays(-7) } | ForEach-Object { Remove-Item $_.FullName -Force }
          } catch { Write-Host "DB backup skipped: $($_.Exception.Message)" }

          # --- 2) .env 생성 (SOPS+age: 커밋된 .env.enc 복호화. 진짜 값은 .env.enc 한 곳에만) ---
          # self-hosted 러너는 사용자 PATH를 못 물려받아 'sops'를 못 찾을 수 있으므로,
          # PATH에 있으면 그걸 쓰고 없으면 고정 경로(C:\solo-project\tools\sops.exe)로 폴백한다.
          if (-not $env:AGE_KEY) { throw 'AGE_KEY secret missing' }
          $sopsCmd = Get-Command sops -ErrorAction SilentlyContinue
          $sopsExe = if ($sopsCmd) { $sopsCmd.Source } else { 'C:\solo-project\tools\sops.exe' }
          if (-not (Test-Path $sopsExe)) { throw "sops not found (PATH or $sopsExe)" }

          # self-hosted 러너의 영속 워크스페이스에는 gitattributes(eol=lf) 도입 전에
          # 체크아웃된 CRLF .env.enc가 남아있을 수 있다. blob이 안 바뀌면 checkout이
          # 워킹트리를 재기록하지 않아 CRLF가 그대로 눌러앉는다. 그러면 SOPS가 메타데이터
          # 타임스탬프의 \r까지 파싱해 'parsing time ... \x0d'로 실패하므로, 복호화 직전
          # CR을 제거한다(.env.enc는 순수 ASCII라 안전). .NET WriteAllText는 BOM/CRLF를
          # 추가하지 않는다.
          $encPath = Join-Path $PWD '.env.enc'
          $enc = [IO.File]::ReadAllText($encPath)
          if ($enc.Contains("`r")) {
            [IO.File]::WriteAllText($encPath, $enc.Replace("`r", ""))
            Write-Host 'normalized .env.enc CRLF -> LF before decrypt'
          }

          $keyFile = Join-Path $env:TEMP 'age-cd-key.txt'
          Set-Content -Path $keyFile -Value $env:AGE_KEY -NoNewline
          try {
            $env:SOPS_AGE_KEY_FILE = $keyFile
            & $sopsExe --decrypt --input-type dotenv --output-type dotenv --output .env .env.enc
            if ($LASTEXITCODE -ne 0) { throw 'sops decrypt failed' }
            Write-Host ".env decrypted from .env.enc (SOPS+age) via $sopsExe"
          } finally {
            Remove-Item $keyFile -Force -ErrorAction SilentlyContinue
          }

          # --- 3) commit-sha 태그로 pull (러너는 직전 'Log in to ghcr' 스텝에서 인증됨) ---
          Write-Host '=== PULL from ghcr ==='
          docker pull $appTag;   if ($LASTEXITCODE -ne 0) { throw "pull failed: $appTag" }
          docker pull $frontTag; if ($LASTEXITCODE -ne 0) { throw "pull failed: $frontTag" }

          # --- 4) digest 고정 (RepoDigests) ---
          $appImage   = "$(docker inspect --format '{{index .RepoDigests 0}}' $appTag)".Trim()
          $frontImage = "$(docker inspect --format '{{index .RepoDigests 0}}' $frontTag)".Trim()
          if (-not $appImage -or -not $frontImage) { throw 'failed to resolve image digests' }
          Write-Host "pinned backend : $appImage"
          Write-Host "pinned frontend: $frontImage"

          # --- 5) 보안 게이트: pull된 이미지에 마이너 IOC 없는지 스캔 ---
          # 오탐 방지를 위해 "특정성 높은 IOC만 대소문자 구분"으로 검사한다.
          #  - 내용(content) grep: C2 IP / 채굴풀 / 드로퍼명처럼 정상 코드엔 없는 문자열만.
          #    ('javae'는 Java의 'JavaE/JavaEE'에 오탐되므로 content에서 제외)
          #  - 파일명(find): 실제 마이너 바이너리가 베이크됐는지 정확한 이름으로만 검사.
          $iocContent = '221\.156\.167\.200|supportxmr|grepb32'
          foreach ($img in $appImage, $frontImage) {
            $scan = (docker run --rm --network none --entrypoint sh $img -c "grep -raoE '$iocContent' /app 2>/dev/null | head -1; find / -xdev -type f \( -name javae -o -name 'xmrig*' -o -name cpuminer \) 2>/dev/null | head -1" | Out-String).Trim()
            if ($scan) { throw "MALWARE IOC detected in $img ($scan) -> DEPLOY ABORTED" }
            Write-Host "scan clean: $img"
          }

          # --- 6) 배포: digest 고정 이미지 + egress 차단 스택 ---
          Write-Host '=== DEPLOY (digest-pinned, egress-locked) ==='
          $env:APP_IMAGE = $appImage
          $env:FRONT_IMAGE = $frontImage
          $env:APP_PULL_POLICY = 'never'      # 이미 pull됨
          $env:FRONT_PULL_POLICY = 'never'
          docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.netlock.yml --env-file .env up -d --remove-orphans
          if ($LASTEXITCODE -ne 0) { throw 'docker compose up failed' }
          docker exec ott-nginx nginx -t; if ($LASTEXITCODE -ne 0) { throw 'nginx -t failed' }
          docker exec ott-nginx nginx -s reload

          # --- 7) 검증: 백엔드 헬스 + 프론트엔드 egress 차단(보안 불변식) ---
          # 기동 직후엔 백엔드가 아직 listen 전이라 wget이 'connection refused'(stderr)를 낸다.
          # PowerShell(Stop)에서 네이티브 stderr는 종료성 오류가 되므로 try/catch로 감싸 재시도한다.
          Write-Host '=== VERIFY ==='
          $healthy = $false
          foreach ($i in 1..30) {
            Start-Sleep -Seconds 5
            $h = ''
            try { $h = "$(docker exec ott-nginx wget -qO- -T3 http://ott-app:8090/actuator/health 2>$null)" } catch { $h = '' }
            if ($h -match 'UP') { $healthy = $true; Write-Host 'backend healthy (status UP)'; break }
            Write-Host "  waiting for backend ($i/30)"
          }
          if (-not $healthy) { throw 'backend health check failed (timeout ~150s)' }

          $egress = ''
          try { $egress = docker exec ott-frontend node -e "const s=require('net').connect({host:'1.1.1.1',port:443,timeout:3500});s.on('connect',()=>{console.log('REACHABLE');process.exit()});s.on('timeout',()=>{console.log('BLOCKED');process.exit()});s.on('error',()=>{console.log('BLOCKED');process.exit()})" 2>$null } catch { $egress = 'BLOCKED(exec-error)' }
          if ("$egress" -match 'REACHABLE') { throw 'SECURITY INVARIANT FAILED: frontend egress is NOT blocked' }
          Write-Host "frontend egress: $egress (expected BLOCKED)"

          try { docker image prune -f --filter "until=168h" 2>$null | Out-Null } catch {}
          Write-Host '=== CD END (secure) ==='
