name: CD

# ============================================================================
# 보안 재설계 (2026-06-24, XMRig 재감염 대응)
# ----------------------------------------------------------------------------
# 변경 전: Docker Hub(para98)에서 이미지를 pull 해 그대로 실행 → 침해 이미지 재배포 위험.
# 변경 후: self-hosted 러너가 "소스에서 직접" 클린 이미지를 빌드(Hub pull 없음) →
#          멀웨어 IOC 스캔 게이트 → egress 차단 보안 스택(docker-compose.netlock.yml)으로 배포 →
#          백엔드 헬스 + 프론트엔드 egress 차단을 검증(실패 시 배포 중단).
#   * 수동 배포와 동일한 compose 조합을 사용해 환경 일관성 유지.
#   * 이미지가 혹시 오염돼도 frontend는 인터넷 egress가 없어 드로퍼/채굴 불가(다층 방어).
# ============================================================================
on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.event == 'push') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Deploy (local clean build + egress-locked secure stack)
        shell: powershell -ExecutionPolicy Bypass -File {0}
        run: |
          Set-StrictMode -Version Latest
          $ProgressPreference = 'SilentlyContinue'
          $ErrorActionPreference = 'Stop'
          Set-Location $env:GITHUB_WORKSPACE
          Write-Host '=== CD START (secure) ==='
          $sha = (git rev-parse HEAD).Trim()
          Write-Host "commit=$sha  workdir=$PWD"

          # --- 1) 데이터베이스 백업 (실패해도 배포는 계속) ---
          try {
            $backupDir = 'C:\solo-project\backups'
            if (-not (Test-Path $backupDir)) { New-Item -ItemType Directory -Path $backupDir | Out-Null }
            $bf = Join-Path $backupDir ("db_{0}.sql" -f (Get-Date -Format 'yyyyMMdd_HHmmss'))
            docker exec ott-postgres pg_dump -U root ott_project_db | Out-File -FilePath $bf -Encoding UTF8
            Write-Host "DB backup -> $bf"
            Get-ChildItem $backupDir -Filter 'db_*.sql' | Where-Object { $_.LastWriteTime -lt (Get-Date).AddDays(-7) } | ForEach-Object { Remove-Item $_.FullName -Force }
          } catch { Write-Host "DB backup skipped: $($_.Exception.Message)" }

          # --- 2) .env 생성 (GitHub Secret) ---
          $envJson = '${{ toJSON(secrets.ENV_FILE) }}'
          if ($envJson -and $envJson -ne 'null' -and $envJson.Trim() -ne '""') {
            $envContent = [System.Text.RegularExpressions.Regex]::Unescape($envJson.Trim('"'))
            Set-Content -Path .env -Value $envContent -NoNewline
            Write-Host '.env written from secret'
          } else { throw 'ENV_FILE secret missing' }

          # --- 3) 클린 이미지 로컬 빌드 (Docker Hub pull 없음. 빌드는 Dockerfile 내부에서 격리 실행) ---
          Write-Host '=== BUILD clean images from source ==='
          docker build --target production --pull -t ott-frontend:clean -f frontend/Dockerfile frontend/
          if ($LASTEXITCODE -ne 0) { throw 'frontend image build failed' }
          docker build --pull -t ott-backend:clean -f backend/Dockerfile backend/
          if ($LASTEXITCODE -ne 0) { throw 'backend image build failed' }

          # --- 4) 보안 게이트: 빌드 이미지에 마이너 IOC가 없는지 스캔 (있으면 배포 중단) ---
          Write-Host '=== SCAN GATE (malware IOC) ==='
          $ioc = '221.156.167.200|supportxmr|grepb32|xmrig|javae'
          foreach ($img in 'ott-frontend:clean','ott-backend:clean') {
            $hit = docker run --rm --network none --entrypoint sh $img -c "grep -raoiE '$ioc' /app 2>/dev/null | head -1"
            if ($hit) { throw "MALWARE IOC detected in $img ($hit) -> DEPLOY ABORTED" }
            Write-Host "scan clean: $img"
          }

          # --- 5) 보안 스택 배포 (egress 차단 + 하드닝 + 클린 이미지) ---
          Write-Host '=== DEPLOY (egress-locked stack) ==='
          docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.netlock.yml --env-file .env up -d --remove-orphans
          if ($LASTEXITCODE -ne 0) { throw 'docker compose up failed' }
          docker exec ott-nginx nginx -t; if ($LASTEXITCODE -ne 0) { throw 'nginx -t failed' }
          docker exec ott-nginx nginx -s reload

          # --- 6) 검증: 백엔드 헬스 + 프론트엔드 egress 차단(보안 불변식) ---
          Write-Host '=== VERIFY ==='
          $healthy = $false
          foreach ($i in 1..20) {
            Start-Sleep -Seconds 5
            $h = (docker exec ott-nginx wget -qO- -T3 http://ott-app:8090/actuator/health 2>$null)
            if ($h -match 'UP') { $healthy = $true; Write-Host "backend healthy: $h"; break }
            Write-Host "  waiting for backend ($i/20)"
          }
          if (-not $healthy) { throw 'backend health check failed' }

          $egress = docker exec ott-frontend node -e "const s=require('net').connect({host:'1.1.1.1',port:443,timeout:3500});s.on('connect',()=>{console.log('REACHABLE');process.exit()});s.on('timeout',()=>{console.log('BLOCKED');process.exit()});s.on('error',()=>{console.log('BLOCKED');process.exit()})"
          if ($egress -match 'REACHABLE') { throw 'SECURITY INVARIANT FAILED: frontend egress is NOT blocked' }
          Write-Host "frontend egress check: $egress (expected BLOCKED)"

          docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.netlock.yml ps
          Write-Host '=== CD END (secure) ==='
