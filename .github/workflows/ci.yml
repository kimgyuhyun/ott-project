name: CI

# ============================================================================
# 보안 재설계 (2026-06-24): Docker Hub(para98, 공개·침해이력) → GitHub Container
# Registry(ghcr.io, 비공개) 전환. 인증은 GITHUB_TOKEN(단기 토큰) → 장기 자격증명
# (REGISTRY_USER/PASSWORD) 불필요. main push 시에만 이미지를 :<commit-sha>로 push하고
# Trivy로 스캔(수정 가능한 CRITICAL이 있으면 실패 → CD로 진행 안 됨).
# 배포(CD)는 cd.yml이 이 이미지를 digest로 고정해 받아간다.
# ============================================================================
on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read
  packages: write          # ghcr push (GITHUB_TOKEN)

env:
  REGISTRY: ghcr.io

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v3
        continue-on-error: true
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build backend (Gradle)
        # 테스트를 함께 실행한다(-x test 제거). 핵심 로직 회귀가 빌드 시점에 잡히도록 하는 것이 목적이므로
        # 테스트가 깨지면 이미지 push/배포로 진행되지 않아야 한다.
        run: |
          cd backend
          chmod +x gradlew || true
          ./gradlew clean build
      - name: Compute lowercase image ref
        id: img
        run: echo "ref=${REGISTRY}/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/ott-backend" >> "$GITHUB_OUTPUT"
      - name: Login to ghcr
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & Push backend image (by commit SHA)
        if: github.ref == 'refs/heads/main'
        run: |
          docker build --pull -t ${{ steps.img.outputs.ref }}:${{ github.sha }} -f backend/Dockerfile backend/
          docker push ${{ steps.img.outputs.ref }}:${{ github.sha }}
      - name: Scan backend image (gate on fixable CRITICAL)
        if: github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.img.outputs.ref }}:${{ github.sha }}
          severity: 'CRITICAL'
          ignore-unfixed: true
          exit-code: '1'   # [2026-07-18] 게이트 활성화: 패치 가능한 CRITICAL 이 있으면 CI 실패 → push/배포 차단. ignore-unfixed 라 고칠 수 없는 취약점엔 안 막힘(무한 실패 방지).
          format: 'table'

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
      - name: Use Node.js 18
        uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
      - name: Compute lowercase image ref
        id: img
        run: echo "ref=${REGISTRY}/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/ott-frontend" >> "$GITHUB_OUTPUT"
      - name: Login to ghcr
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & Push frontend image (by commit SHA)
        if: github.ref == 'refs/heads/main'
        run: |
          docker build --target production --pull -t ${{ steps.img.outputs.ref }}:${{ github.sha }} -f frontend/Dockerfile frontend/
          docker push ${{ steps.img.outputs.ref }}:${{ github.sha }}
      - name: Scan frontend image (gate on fixable CRITICAL)
        if: github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.img.outputs.ref }}:${{ github.sha }}
          severity: 'CRITICAL'
          ignore-unfixed: true
          exit-code: '1'   # [2026-07-18] 게이트 활성화: 패치 가능한 CRITICAL 이 있으면 CI 실패 → push/배포 차단. ignore-unfixed 라 고칠 수 없는 취약점엔 안 막힘.
          format: 'table'
