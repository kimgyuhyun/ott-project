# 프로덕션용 오버라이드 - docker-compose -f docker-compose.yml -f docker-compose.prod.yml up

services:
  app: # Spring Boot 애플리케이션 서비스
    image: ${APP_IMAGE:-ott-backend:clean}  # CD가 APP_IMAGE=ghcr digest 로 덮어씀. 수동 배포 기본값=로컬 클린 이미지
    env_file:
      - .env  # 서버의 .env 파일 사용
    environment:
      # 프로덕션 프로파일 설정
      SPRING_PROFILES_ACTIVE: prod
      # 프로덕션 데이터베이스 연결 정보 (실제 환경에 맞게 수정 필요)
      SPRING_DATASOURCE_URL: jdbc:postgresql://ott-postgres:5432/ott_project_db
      # [SECURITY 2026-07-18] 앱 런타임 커넥션은 최소권한 계정(ott_app)으로 낮춘다.
      # DB_APP_USERNAME/DB_APP_PASSWORD 미설정 시 root+DB_PASSWORD 로 폴백(현재 동작 유지).
      SPRING_DATASOURCE_USERNAME: ${DB_APP_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${DB_APP_PASSWORD:-${DB_PASSWORD}}
      # flyway 마이그레이션(DDL)은 계속 권한 계정 root 로 실행한다. ott_app 에는 DDL 권한을
      # 주지 않으므로, url 을 명시해 flyway 가 런타임과 분리된 별도 datasource(root)로 붙게 강제한다.
      SPRING_FLYWAY_URL: jdbc:postgresql://ott-postgres:5432/ott_project_db
      SPRING_FLYWAY_USER: root
      SPRING_FLYWAY_PASSWORD: ${DB_PASSWORD}
      # JPA 설정 (프로덕션용)
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      # Redis 설정
      SPRING_DATA_REDIS_HOST: ott-redis
      SPRING_DATA_REDIS_PORT: 6379
      
      # 소셜 로그인 설정
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET}
      
      # 도메인 설정 (프로덕션 고정값 — 하드코딩)
      # 주의: ${BASE_URL:-기본값} 는 .env 에 BASE_URL 이 "비어있을 때만" 기본값을 쓴다.
      # .env(개발용)에 BASE_URL=http://127.0.0.1 이 값으로 있으면 그게 그대로 들어와
      # OAuth redirect_uri 가 127.0.0.1 이 되어 구글/카카오 로그인이 깨진다(엄격한 redirect_uri 검사).
      # prod 전용 파일이므로 도메인/쿠키는 .env 와 무관하게 프로덕션 값으로 고정한다.
      BASE_URL: https://laputa.kozow.com
      FRONTEND_ORIGIN: https://laputa.kozow.com
      COOKIE_DOMAIN: laputa.kozow.com
      COOKIE_SECURE: "true"
      COOKIE_SAME_SITE: lax
      
      # 메일 설정
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      
      # 아임포트 결제 설정
      IAMPORT_MERCHANT_CODE: ${IAMPORT_MERCHANT_CODE}
      IAMPORT_API_KEY: ${IAMPORT_API_KEY}
      IAMPORT_API_SECRET: ${IAMPORT_API_SECRET}
      IAMPORT_WEBHOOK_URL: ${IAMPORT_WEBHOOK_URL}
      IAMPORT_KAKAO_CHANNEL_KEY: ${IAMPORT_KAKAO_CHANNEL_KEY}
      IAMPORT_TOSS_CHANNEL_KEY: ${IAMPORT_TOSS_CHANNEL_KEY}
      IAMPORT_NICE_CHANNEL_KEY: ${IAMPORT_NICE_CHANNEL_KEY}
      
      # 결제 설정
      PAYMENT_TEST_AMOUNT: ${PAYMENT_TEST_AMOUNT}
      PAYMENT_DEV_MODE: ${PAYMENT_DEV_MODE}
      
      # TMDB API
      TMDB_API_KEY: ${TMDB_API_KEY}
      
      # Redis 네임스페이스
      REDIS_NAMESPACE: ${REDIS_NAMESPACE}
      RECENT_SEARCH_TTL_DAYS: ${RECENT_SEARCH_TTL_DAYS}
      # CORS 허용 오리진 (프로덕션 도메인 명시)
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-https://laputa.kozow.com}
    # 보안 하드닝(재침해 방어): 능력 제거 + 권한상승 차단 + /tmp만 쓰기 + 리소스 상한
    # (비root는 이미지의 USER 1001로 적용됨. JVM 호환 위해 read_only는 미적용)
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:nosuid,nodev,size=256m
    mem_limit: 2g
    cpus: 2.0

  frontend: # Next.js 프론트엔드 서비스
    image: ${FRONT_IMAGE:-ott-frontend:clean}  # CD가 FRONT_IMAGE=ghcr digest 로 덮어씀. 수동 배포 기본값=로컬 클린 이미지
    environment:
      # 프로덕션에서는 브라우저가 내부 호스트(ott-app)에 접근할 수 없으므로
      # NEXT_PUBLIC_BACKEND_ORIGIN을 노출하지 않습니다. Nginx가 /api 및 /login/oauth2/* 를 프록시합니다.
      NODE_ENV: production
    # 프로덕션에서는 볼륨 마운트 제거 (정적 파일로 실행)
    # volumes: 제거됨
    # 보안 하드닝(재침해 방어): 비root(이미지) + 읽기전용 FS + 능력 제거 + 권한상승 차단 + 리소스 상한
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:noexec,nosuid,nodev,size=64m
      # mode=1777 필수: tmpfs 기본은 root:root 0755라 비root(uid 1000 node)가 못 써서
      # Next의 fetch-cache mkdir이 EACCES로 실패한다. sticky+world-writable로 캐시 쓰기 허용.
      - /app/.next/cache:size=256m,mode=1777
    mem_limit: 1g
    cpus: 1.5

  redis: # Redis 캐시 서비스
    env_file:
      - .env  # REDIS_PASSWORD 주입
    # [SECURITY 2026-07-18] requirepass 인증. base 의 command 는 배열이라 오버라이드가
    # 통째로 대체하므로 기존 --save ""/--appendonly no 플래그를 함께 유지한다.
    # ${REDIS_PASSWORD:-} 는 .env 에 값이 있으면 인증 강제, 비어있으면 --requirepass ""
    # 로 인증 비활성(기존 동작 보존). Spring 은 application-prod.yml 의 REDIS_PASSWORD 로 접속.
    command: ["redis-server", "--save", "", "--appendonly", "no", "--requirepass", "${REDIS_PASSWORD:-}"]

  postgres: # PostgreSQL 데이터베이스 서비스
    environment:
      # 프로덕션 데이터베이스 설정
      POSTGRES_DB: ott_project_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${DB_PASSWORD}  # 환경변수 사용 권장

  nginx: # Nginx 리버스 프록시
    # 프로덕션용 nginx 설정 (필요시 별도 설정 파일 사용)
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot
    ports:
      - "80:80"
      - "443:443"

volumes:
  certbot-etc:
    external: true
    name: certbot-etc
  certbot-webroot:
    external: true
    name: certbot-webroot