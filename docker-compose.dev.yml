# 개발용 오버라이드 - 반드시 명시적으로 지정해야 적용된다:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# [SECURITY 2026-07-18] 예전 파일명(docker-compose.override.yml)은 플래그 없는
# `docker compose up` 에 자동 병합돼, 실수로 실행하면 netlock(egress 차단)이 빠지고
# 프론트가 dev 모드로 떠서 인터넷 아웃바운드가 다시 열리는 함정이 있었다.
# 자동 병합을 끊기 위해 .dev.yml 로 개명했다. 안전한 배포는 deploy.ps1 참고.

services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend/src:/app/src  # 소스 코드만 마운트
      - /app/build  # 빌드 결과물은 컨테이너에 유지
    environment:
      - SPRING_PROFILES_ACTIVE=dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development  # 개발용 스테이지 사용
    volumes:
      - ./frontend:/app           # 소스 코드 실시간 반영
      - /app/node_modules         # node_modules는 컨테이너 유지
    environment:
      - WATCHPACK_POLLING=true    # 핫 리로드 최적화
      - CHOKIDAR_USEPOLLING=true
      - NODE_ENV=development      # 개발 모드 명시
      - HOST=0.0.0.0              # 컨테이너 외부 접근 허용
      - PORT=3000                 # Next.js 개발 서버 포트
    command: ["npm", "run", "dev", "--", "--hostname", "0.0.0.0", "--port", "3000"]  # 컨테이너 외부 접속 허용

  nginx:  # 개발용 nginx 설정 추가
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro  # 개발용 설정 파일 사용