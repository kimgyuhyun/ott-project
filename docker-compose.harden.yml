# 보안 하드닝 + 로컬 클린 빌드 오버라이드
# 사용법:
#   docker compose -f docker-compose.yml -f docker-compose.harden.yml build frontend
#   docker compose -f docker-compose.yml -f docker-compose.harden.yml up -d --no-deps --force-recreate frontend
#
# 목적: 침해된 Docker Hub 이미지(para98/ott-frontend:latest) 대신
#       깨끗한 소스(frontend/Dockerfile)에서 로컬 빌드한 이미지를 사용하고,
#       컨테이너 권한/능력을 최소화한다.
services:
  app:                                 # Spring Boot 백엔드 — 클린 소스 재빌드 + 하드닝
    image: ott-backend:clean
    build:
      context: ./backend
    pull_policy: never                 # Docker Hub(para98/ott-backend) pull 금지
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:nosuid,nodev,size=256m    # JVM/Tomcat 임시 경로 (실행은 허용: JIT 등 고려해 noexec 제외)
    mem_limit: 2g
    cpus: 2.0
    # 비root(USER 1001)는 이미지에서 적용됨. read_only는 JVM 호환 위해 미적용.

  frontend:
    image: ott-frontend:clean          # 로컬 클린 빌드 결과물 (Docker Hub에서 pull 안 함)
    build:
      context: ./frontend
      target: production
    pull_policy: never                 # 절대 레지스트리에서 pull 금지 (트로이목마 :latest 차단)
    user: "node"                       # 비root 실행 (이미지에도 USER node 적용됨)
    security_opt:
      - no-new-privileges:true         # 권한 상승 차단
    cap_drop:
      - ALL                            # 모든 리눅스 캐퍼빌리티 제거
    read_only: true                    # 루트 파일시스템 읽기전용 (public 등에 멀웨어 드롭 차단)
    tmpfs:
      - /tmp:noexec,nosuid,nodev,size=64m   # /tmp는 쓰기 가능하되 실행 불가
      - /app/.next/cache:size=256m          # ISR(revalidate) 캐시 쓰기 경로 확보
    mem_limit: 1g                      # 메모리 상한 (채굴 폭주 방지)
    cpus: 1.5                          # CPU 상한
    restart: unless-stopped
