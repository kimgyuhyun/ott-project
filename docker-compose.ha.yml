# 백엔드 2인스턴스(무중단 배포)용 오버레이 — 2026-07-20
#
# 반드시 prod + netlock 뒤에 붙여서 쓴다:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#                  -f docker-compose.netlock.yml -f docker-compose.ha.yml up -d
# 정식 절차는 deploy-rolling.ps1 을 쓸 것. 맨손으로 up 하면 두 인스턴스가 동시에
# 재생성되어 무중단이 깨진다(실측: 동시 재기동 시 197요청 중 164건 502).
#
# 안전장치: 이 파일은 egress 네트워크를 참조한다. netlock 을 빼고 실행하면
# "network egress not found" 로 즉시 실패한다 → netlock 누락 배포가 원천 차단된다.
#
# 왜 extends 를 쓰나:
#   app2 의 환경변수/보안설정을 손으로 복사하면 나중에 app 에만 변수를 추가했을 때
#   app2 가 조용히 뒤처진다. prod 의 app 정의를 그대로 상속받아 그 함정을 없앤다.
#   (검증: docker compose config 로 app 과 app2 의 environment 를 diff 하면 같아야 한다)

services:
  # 2번째 백엔드 인스턴스
  app2:
    extends:
      file: docker-compose.prod.yml
      service: app          # prod 의 image/env_file/environment/보안하드닝/리소스상한을 전부 상속
    container_name: ott-app-2
    restart: unless-stopped
    pull_policy: ${APP_PULL_POLICY:-never}   # netlock 의 app 설정과 동일하게 맞춘다
    depends_on:
      - postgres
      - redis
      - kafka
      - rabbitmq
    environment:
      # base(docker-compose.yml)에만 있고 prod 에는 없는 항목이라 여기서 보충한다.
      # (app 과 app2 의 environment 가 완전히 같아야 한다 — 아래 명령으로 검증 가능)
      #   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
      #     -f docker-compose.netlock.yml -f docker-compose.ha.yml config --format json
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-ott-kafka:9094}
      SECURE_LINK_SECRET: ${SECURE_LINK_SECRET:-}
      LOKI_INSTANCE: ott-app-2   # prod.yml(app=ott-app) override — Loki 로그에서 인스턴스 구분용
    ports:
      # 롤링 배포 스크립트가 인스턴스별 기동 완료를 직접 확인하기 위한 루프백 포트.
      # (nginx 를 거치면 어느 인스턴스가 응답했는지 알 수 없어 순차 교체를 제어할 수 없다)
      - "127.0.0.1:8093:8090"
    networks:
      # netlock 의 app 과 반드시 동일해야 한다. egress 가 빠지면 OAuth/메일/결제/TMDB 가 죽는다.
      - default
      - data
      - egress

  nginx:
    volumes:
      # 같은 마운트 지점을 덮어써서 upstream 이 있는 HA 설정을 쓴다.
      # 원본 nginx.prod.conf 는 수정하지 않으므로, 이 파일을 빼면 즉시 원상복구된다.
      - ./nginx/nginx.prod.ha.conf:/etc/nginx/conf.d/default.conf:ro
