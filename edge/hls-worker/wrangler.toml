name = "ott-hls-edge"
main = "src/worker.js"
compatibility_date = "2024-11-01"

# R2 버킷 바인딩 — bucket_name 은 실제 HLS 버킷명으로 맞출 것(예: ott-hls).
# 요청 경로(/sintel/master.m3u8)가 그대로 이 버킷의 key(sintel/master.m3u8)로 매핑된다.
[[r2_buckets]]
binding = "HLS_BUCKET"
bucket_name = "ott-hls"

# SECURE_LINK_SECRET 은 소스/설정에 넣지 않는다.
# 배포 전 1회:  wrangler secret put SECURE_LINK_SECRET
#   → 백엔드 .env 의 SECURE_LINK_SECRET 과 반드시 동일한 값을 입력.
