# Grafana 데이터소스 자동 프로비저닝
# Grafana 기동 시 Prometheus 를 기본 데이터소스로 자동 등록한다(수동 설정 불필요).
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: ottprometheus          # 고정 uid — 대시보드 JSON 이 이 uid 로 데이터소스를 참조한다
    access: proxy               # Grafana 서버가 대신 질의(브라우저가 직접 접근 안 함)
    url: http://prometheus:9090 # monitoring 네트워크의 컨테이너 이름으로 도달
    isDefault: true
    editable: false
