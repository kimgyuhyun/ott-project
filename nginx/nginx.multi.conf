# [실험 전용] 백엔드 2인스턴스 로드밸런싱 검증용 — 2026-07-20
# docker-compose.multi.yml 에서만 마운트한다. 실서비스 nginx.prod.conf 와 무관.
#
# 검증 목표
#  1) 요청이 두 인스턴스로 실제 분산되는가
#  2) 한 인스턴스가 죽었을 때 요청이 살아있는 쪽으로 넘어가는가(502 없이)
#  3) 순차 교체 중 연속 요청 실패가 0건인가 (= 무중단의 정의)

upstream ott_backend {
    # 기본 라운드로빈. ip_hash(스티키)를 쓰지 않는 이유: 세션이 Redis 에 있어
    # 어느 인스턴스로 가도 되기 때문. 스티키를 걸면 분산 검증 자체가 안 된다.
    server ott-multi-app1:8090 max_fails=1 fail_timeout=5s;
    server ott-multi-app2:8090 max_fails=1 fail_timeout=5s;
}

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://ott_backend;

        # 재기동 중인 인스턴스로 간 요청을 살아있는 쪽으로 재시도한다.
        # 이게 없으면 인스턴스를 2개 띄워도 배포 중 502 가 그대로 나간다.
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        # 죽은 인스턴스에 오래 매달리지 않도록 연결 타임아웃을 짧게 잡는다.
        proxy_connect_timeout 2s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;

        # 어느 인스턴스가 응답했는지 눈으로 확인하기 위한 실험용 헤더.
        # 실서비스에는 넣지 않는다(내부 주소 노출).
        add_header X-Upstream $upstream_addr always;
    }
}
