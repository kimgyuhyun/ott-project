# 프로덕션 nginx 설정 — 백엔드 2인스턴스(무중단 배포)용
#
# nginx.prod.conf 와의 차이는 딱 두 가지다:
#   1) upstream ott_backend 블록 추가 (ott-app + ott-app-2)
#   2) 백엔드로 가던 proxy_pass 대상을 ott-app:8090 → ott_backend 로 변경
#      + proxy_next_upstream (재기동 중인 인스턴스로 간 요청을 살아있는 쪽으로 재시도)
# 나머지(444 드롭, TLS, 레이트리밋, 보안헤더, 타임아웃)는 원본과 동일하다.
#
# 2026-07-20 실험 스택(-p ott-multi, 포트 8888)에서 검증한 설정:
#   - 순차 교체 중 374요청 실패 0
#   - 동시 재기동(대조군)은 197요청 중 164건 502  → 재시도 설정이 핵심이다
#
# 적용:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#                  -f docker-compose.netlock.yml -f docker-compose.ha.yml up -d
#   (docker-compose.ha.yml 이 이 파일을 마운트한다. 원본 nginx.prod.conf 는 그대로 둔다.)

limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=strict_limit:10m rate=3r/s;

# 백엔드 인스턴스 풀.
# max_fails=1 fail_timeout=5s: 한 번 실패하면 5초간 해당 인스턴스를 건너뛴다.
# 스티키(ip_hash)를 쓰지 않는 이유: 세션이 Redis 에 있어 어느 인스턴스로 가도 되기 때문.
upstream ott_backend {
    server ott-app:8090   max_fails=1 fail_timeout=5s;
    server ott-app-2:8090 max_fails=1 fail_timeout=5s;
}

# [SECURITY 2026-07-18] IP 직접 접근·이상 Host/SNI 드롭(default_server).
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    ssl_reject_handshake on;
}

server {
    listen 80;
    listen [::]:80;
    server_name laputa.kozow.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot; # certbot 웹루트
    }

    location / {
        return 301 https://laputa.kozow.com$request_uri; # 고정 도메인으로 리다이렉트
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name laputa.kozow.com;
    http2 on;

    client_max_body_size 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # CSP는 Next(next.config.ts headers)에서만 — nginx 이중 헤더 시 frame-src 없는 정책과 충돌함
    ssl_certificate /etc/letsencrypt/live/laputa.kozow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/laputa.kozow.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # [HA] 업스트림 인스턴스가 죽었거나 재기동 중이면 다음 인스턴스로 재시도한다.
    # 이 설정이 없으면 인스턴스를 2개 띄워도 롤링 중 일부 요청이 그대로 502 를 받는다.
    # server 레벨에 한 번만 선언해 아래 모든 location 에 상속시킨다.
    # (ott-frontend 는 upstream 그룹이 아니라 단일 서버이므로 영향받지 않는다.)
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 2;
    proxy_connect_timeout 2s;

    # Actuator 헬스체크 (UptimeRobot 모니터링용)
    location /actuator/health {
        proxy_pass http://ott_backend/actuator/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # 프론트 정적/SSR 프록시 (단일 인스턴스 — 변경 없음)
    location / {
        limit_req zone=general_limit burst=50 nodelay;
        proxy_pass http://ott-frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
        proxy_redirect off;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 인증/회원가입 API (엄격한 제한)
    location /api/auth/ {
        limit_req zone=strict_limit burst=5 nodelay;
        proxy_pass http://ott_backend/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # 결제 API (엄격한 제한)
    location /api/payment/ {
        limit_req zone=strict_limit burst=5 nodelay;
        proxy_pass http://ott_backend/api/payment/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # 관리자 애니 동기화 (장시간 작업 전용 타임아웃)
    location /api/admin/anime/ {
        limit_req zone=general_limit burst=20 nodelay;
        proxy_pass http://ott_backend/api/admin/anime/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_read_timeout 600s;   # 수집 완료까지 대기(약 500개 규모까지 커버)
        proxy_send_timeout 600s;
        # 장시간 작업은 재시도하면 중복 수집이 되므로 이 경로만 재시도를 끈다.
        proxy_next_upstream off;
    }

    # 백엔드 API 프록시 (일반 제한)
    location /api/ {
        limit_req zone=general_limit burst=20 nodelay;
        proxy_pass http://ott_backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # 주의: /oauth2/success, /oauth2/failure 는 프론트 라우팅이므로 기본 location / 으로 처리

    # OAuth2 콜백 프록시 (Spring Security 기본 콜백 경로)
    location /login/oauth2/ {
        proxy_pass http://ott_backend/login/oauth2/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
